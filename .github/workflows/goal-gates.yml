name: Goal Gates

on:
  pull_request:
    branches:
      - main
      - taosx
  push:
    branches:
      - main
      - taosx
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    runs-on: ubuntu-latest
    env:
      GOWORK: off
      XLIB_CONTEXT: ci_pull_request
      XLIB_ENABLE_VULNCHECK: "1"
      XLIB_FORCE_VULNCHECK: "1"
      XLIB_VULNCHECK_INTERVAL_HOURS: "168"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # tag v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Worktree Gate
        run: make worktree-guard

      - name: Build
        run: make build

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Release Check
        run: make release-check

      - name: Evidence Check
        run: make evidence-check
