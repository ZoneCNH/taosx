name: Integration

on:
  pull_request:
    branches:
      - main
      - taosx
  push:
    branches:
      - main
      - taosx
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: [self-hosted, Linux, X64, sre/storage-heavy]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag v6.0.3

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # tag v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Integration
        run: GOWORK=off make integration
