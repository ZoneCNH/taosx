name: Security

on:
  pull_request:
    branches:
      - main
      - taosx
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: [self-hosted, Linux, X64, sre/storage-heavy]
    env:
      XLIB_ENABLE_VULNCHECK: "1"
      XLIB_FORCE_VULNCHECK: "1"
      XLIB_VULNCHECK_INTERVAL_HOURS: "168"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag v6.0.3

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # tag v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Security
        run: GOWORK=off make security
